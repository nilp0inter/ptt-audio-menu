[package]
name = "ptt-audio-menu"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"

[dependencies]
anyhow = "1"
bluer = { version = "0.17.4", features = ["bluetoothd", "rfcomm"] }
clap = { version = "4", features = ["derive"] }
directories = "5"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["io-util", "macros", "rt-multi-thread", "time"] }
toml = "0.8"
uuid = "1"

[dev-dependencies]
tempfile = "3"
